name: Check Builds

# Compile-checks the generated Rust and C++ output for every definition, so a
# definition can't land in a state that doesn't actually build. The defs
# describe Windows game memory, so both backends target Windows: Rust via the
# `*-pc-windows-msvc` targets on Linux (check-only, no linking), and C++ via
# the native MSVC toolchain on a Windows runner.

on:
  push:
    branches: [main]
    paths: ["projects/**", "build.py", ".github/workflows/check-builds.yml"]
  pull_request:
    branches: [main]
    paths: ["projects/**", "build.py", ".github/workflows/check-builds.yml"]
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyxis-defs
        uses: actions/checkout@v4

      # pyxis is checked out (not just installed) so build.py can build the
      # driver from source via --path.
      - name: Checkout pyxis
        uses: actions/checkout@v4
        with:
          repository: ferrobrew/pyxis
          path: .pyxis-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Rust (with Windows targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc, x86_64-pc-windows-msvc

      - name: Run Rust build checks
        run: python3 build.py --check-builds rust --path .pyxis-src/driver

  cpp:
    runs-on: windows-latest
    steps:
      - name: Checkout pyxis-defs
        uses: actions/checkout@v4

      - name: Checkout pyxis
        uses: actions/checkout@v4
        with:
          repository: ferrobrew/pyxis
          path: .pyxis-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # The host toolchain builds the pyxis driver; MSVC + CMake are
      # preinstalled on the runner and drive the C++ build natively (no xwin,
      # no toolchain file — build.py falls through to vanilla MSVC).
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run C++ build checks
        run: python build.py --check-builds cpp --path .pyxis-src/driver
